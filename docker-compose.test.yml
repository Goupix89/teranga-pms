# =============================================================================
# Teranga PMS — Test Environment (demo-teranga.jdidit.cloud)
# Usage: docker compose -f docker-compose.test.yml --env-file .env.test up -d --build
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: teranga-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: teranga_test
      POSTGRES_USER: teranga_user
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - test_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teranga_user -d teranga_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teranga-test-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - test_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: teranga-test-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      # Database & Redis
      DATABASE_URL: "postgresql://teranga_user:${DB_PASSWORD}@postgres:5432/teranga_test?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      # JWT
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      ACCESS_TOKEN_EXPIRY: "30m"
      REFRESH_TOKEN_EXPIRY_DAYS: "7"
      # Server
      NODE_ENV: production
      PORT: "4000"
      PUBLIC_URL: "${PUBLIC_URL}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      ENABLE_CRON: "true"
      # Security
      BCRYPT_SALT_ROUNDS: "12"
      RATE_LIMIT_MAX: "200"
      # FedaPay
      FEDAPAY_SECRET_KEY: "${FEDAPAY_SECRET_KEY}"
      FEDAPAY_SANDBOX: "${FEDAPAY_SANDBOX:-true}"
      FEDAPAY_CALLBACK_URL: "${PUBLIC_URL}/dashboard"
      FEDAPAY_WEBHOOK_SECRET: "${FEDAPAY_WEBHOOK_SECRET:-}"
      # Firebase (optional)
      FIREBASE_SERVICE_ACCOUNT_PATH: "${FIREBASE_SERVICE_ACCOUNT_PATH:-}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
    volumes:
      - test_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_URL}"
        NEXT_PUBLIC_FIREBASE_API_KEY: "${NEXT_PUBLIC_FIREBASE_API_KEY:-}"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}"
        NEXT_PUBLIC_FIREBASE_APP_ID: "${NEXT_PUBLIC_FIREBASE_APP_ID:-}"
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: "${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}"
    container_name: teranga-test-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production

volumes:
  test_pg_data:
  test_redis_data:
  test_uploads:
