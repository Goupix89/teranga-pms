# =============================================================================
# Teranga PMS — Production Environment
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# =============================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: teranga-prod-db
    restart: always
    environment:
      POSTGRES_DB: teranga_prod
      POSTGRES_USER: teranga_user
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teranga_user -d teranga_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: teranga-prod-redis
    restart: always
    command: >
      redis-server
        --requirepass "${REDIS_PASSWORD}"
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: teranga-prod-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_URL: "postgresql://teranga_user:${DB_PASSWORD}@postgres:5432/teranga_prod?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      NODE_ENV: production
      PORT: "4000"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      ENABLE_CRON: "true"
      BCRYPT_SALT_ROUNDS: "12"
      RATE_LIMIT_MAX: "100"
      ACCESS_TOKEN_EXPIRY: "15m"
      REFRESH_TOKEN_EXPIRY_DAYS: "30"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      STRIPE_SUCCESS_URL: "${PUBLIC_URL}/auth/register/success"
      STRIPE_CANCEL_URL: "${PUBLIC_URL}/auth/register?cancelled=true"
    volumes:
      - prod_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_URL}"
    container_name: teranga-prod-web
    restart: always
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M

  # Automated daily backups
  backup:
    image: postgres:15-alpine
    container_name: teranga-prod-backup
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: "${DB_PASSWORD}"
    volumes:
      - prod_backups:/backups
    entrypoint: /bin/sh
    command: >
      -c "pg_dump -h postgres -U teranga_user teranga_prod |
          gzip > /backups/teranga_$$(date +%Y%m%d_%H%M%S).sql.gz &&
          echo 'Backup OK' &&
          find /backups -name '*.sql.gz' -mtime +30 -delete"
    profiles:
      - backup

volumes:
  prod_pg_data:
  prod_redis_data:
  prod_uploads:
  prod_backups:
